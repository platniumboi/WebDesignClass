<html>

<head>
  <meta charset="utf-8">
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <title>A-Frame Starter</title>
</head>

<body>
  <a-scene>

    <!--assets are items meant to preload-->
    <!-- I give the asset an ID and reference it in the "material" of the "logohedron"-->
    <a-assets>
      <img id="logo" src="pix/IAM_logo.png">
    </a-assets>

    <a-entity geometry="primitive: sphere; radius: 0.3" position="0 1.25 -5" rotation="0 0 0" material="color: #4CC3D9" animation="property: rotation; to: 0 360 0; loop: true; dur: 1000">
        <a-octahedron position="3.5 0 0" radius="0.3" color="#00A855"></a-octahedron>
        <a-octahedron position="-3.5 0 0" radius="0.3" color="#F63A3A"></a-octahedron>
        <a-octahedron position="0 0 3.5" radius="0.3" color="#0077EE"></a-octahedron>
        <a-octahedron position="0 0 -3.5" radius="0.3" color="#FFD700"></a-octahedron>
    </a-entity>
 
    <!--this is a test block because it's not updating on the browser for some reason-->
    <a-entity 
    geometry="primitive: plane; width: 12; height: 12" 
    material="color: #000000" 
    position="0 0 -4"
    rotation="-90 0 0"></a-entity>
    <!--sky-->
    <!--notice that the "sky" here is not in the <a-entity> format-->
    <!--"sky" is not meant as a geometry in the scene but a background-->
    <a-sky color="#87CEEB"></a-sky>

  </a-scene>
</body>

</html>
